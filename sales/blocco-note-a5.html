<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evulery — Blocco note A5</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@page { size: A5 portrait; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #e9ecef; color: #1a1d23; }

/* ===== Toolbar (solo schermo) ===== */
.toolbar { background: #fff; padding: 14px 20px; text-align: center; border-bottom: 2px solid #e9ecef; position: sticky; top: 0; z-index: 10; }
.toolbar button { background: #00844A; color: #fff; border: 0; padding: 10px 22px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; }
.toolbar button:hover { background: #006837; }
.toolbar .hint { font-size: 12px; color: #6c757d; margin-top: 8px; }
@media print { .toolbar { display: none !important; } body { background: #fff; } .wrap { padding: 0; } }

.wrap { padding: 28px 20px 50px; display: flex; justify-content: center; }

/* ===== Foglio A5 (148 x 210 mm) ===== */
.sheet {
    width: 148mm; height: 210mm; background: #fff; position: relative;
    box-shadow: 0 6px 26px rgba(0,0,0,.14); overflow: hidden;
    display: flex; flex-direction: column;
}
@media print { .sheet { box-shadow: none; } }

/* Barra brand in alto */
.top-bar { height: 3mm; background: linear-gradient(90deg, #00844A 0%, #4ade80 100%); }

/* Header */
.bn-head { display: flex; align-items: center; justify-content: space-between; padding: 8mm 12mm 5mm; }
.bn-lock { display: flex; align-items: center; gap: 3mm; }
.bn-logomark { width: 11mm; height: 11mm; }
.bn-word { font-size: 17pt; font-weight: 800; letter-spacing: -.6px; color: #042418; line-height: 1; }
.bn-word .dot { color: #00844A; }
.bn-payoff { font-size: 8pt; font-style: italic; color: #6c757d; text-align: right; line-height: 1.3; max-width: 42mm; }

/* Area appunti con righe leggere */
.bn-notes {
    flex: 1; margin: 0 12mm; position: relative;
    background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 8.4mm,
        #e8edf0 8.4mm,
        #e8edf0 8.5mm
    );
    background-position: 0 2mm;
}
/* Filetto verticale (margine sinistro tipo quaderno) */
.bn-notes::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 0;
    border-left: 1px solid #f0d9d2;
}
.bn-label {
    position: absolute; top: -0.5mm; right: 0;
    font-size: 7.5pt; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: #c3ccd2;
}
/* Watermark logomark tenue in basso */
.bn-watermark {
    position: absolute; right: 8mm; bottom: 6mm; width: 40mm; height: 40mm; opacity: .04;
    pointer-events: none;
}

/* Footer */
.bn-foot {
    margin: 4mm 12mm 8mm; padding-top: 3mm; border-top: 1px solid #e3e8ea;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 8pt; color: #6c757d;
}
.bn-foot .c { display: flex; align-items: center; gap: 2mm; }
.bn-foot .dotmark { width: 2.2mm; height: 2.2mm; border-radius: 50%; background: #00844A; display: inline-block; }
.bn-foot strong { color: #042418; font-weight: 700; }
</style>
</head>
<body>

<div class="toolbar">
    <button type="button" onclick="window.print()">Stampa blocco note A5</button>
    <div class="hint">Formato A5 (148&times;210 mm). Per la tipografia: <strong>esporta in PDF</strong> e ordina un blocco collato in testa, 50-100 fogli, carta uso mano 80-90g.</div>
</div>

<div class="wrap">
    <div class="sheet">
        <div class="top-bar"></div>

        <div class="bn-head">
            <div class="bn-lock">
                <svg class="bn-logomark" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" aria-label="evulery">
                    <circle cx="48" cy="48" r="44" fill="#00844A"/>
                    <path d="M30 48 Q30 32 48 32 Q66 32 66 48 L36 48 Q38 60 50 60 Q58 60 62 56" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none"/>
                    <circle cx="68" cy="62" r="5" fill="#4ade80"/>
                </svg>
                <span class="bn-word">evulery<span class="dot">.</span></span>
            </div>
            <div class="bn-payoff">Pieni la sera,<br>felici la mattina.</div>
        </div>

        <div class="bn-notes">
            <span class="bn-label">Appunti</span>
            <svg class="bn-watermark" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
                <circle cx="48" cy="48" r="44" fill="#00844A"/>
                <path d="M30 48 Q30 32 48 32 Q66 32 66 48 L36 48 Q38 60 50 60 Q58 60 62 56" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none"/>
                <circle cx="68" cy="62" r="5" fill="#4ade80"/>
            </svg>
        </div>

        <div class="bn-foot">
            <div class="c"><span class="dotmark"></span><strong>evulery.it</strong></div>
            <div class="c">info@evulery.it</div>
            <div class="c">Soluzioni per il tuo ristorante</div>
        </div>
    </div>
</div>

</body>
</html>
